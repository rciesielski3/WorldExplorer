name: Monthly Countries Dataset Update

on:
  schedule:
    - cron: "0 3 1 * *" # 1st of every month at 3 AM UTC
  workflow_dispatch: # Allow manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "18"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Update countries dataset
        run: npm run countries:update

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "has_changes=false" >> $GITHUB_OUTPUT
          else
            echo "has_changes=true" >> $GITHUB_OUTPUT
          fi

      - name: Create commit and branch
        if: steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "Countries Bot"
          git config user.email "bot@worldexplorer.local"
          git add data/countries.json
          git commit -m "chore: update countries dataset

Automated monthly update from countries.dev + mledoze/countries sources.
All country descriptions preserved during this update."

      - name: Create Pull Request
        if: steps.changes.outputs.has_changes == 'true'
        uses: peter-evans/create-pull-request@v5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: |
            chore: update countries dataset

            Automated monthly update from countries.dev + mledoze/countries sources.
            All country descriptions preserved during this update.
          branch: chore/countries-dataset-${{ github.run_number }}
          title: "chore: monthly countries dataset update"
          body: |
            ## 🌍 Monthly Countries Dataset Update

            This automated PR updates the countries dataset with the latest data from:
            - countries.dev
            - mledoze/countries

            ### Details
            - All country descriptions have been preserved
            - Dataset version incremented
            - Validation passed

            ### Testing
            ```bash
            npm run countries:validate
            npm test
            ```

            Please review and merge if the update looks correct.
          labels: "chore,automated"

      - name: No changes detected
        if: steps.changes.outputs.has_changes == 'false'
        run: |
          echo "✓ Dataset is up to date, no changes needed"
