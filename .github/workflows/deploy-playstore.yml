name: Deploy to Play Store

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g., 1.3.0)'
        required: false
        type: string
      track:
        description: 'Play Store release track'
        required: true
        type: choice
        options:
          - internal
          - alpha
          - beta
          - production
        default: internal
      release_notes:
        description: 'Release notes for Play Store'
        required: false
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: write
    outputs:
      aab-path: ${{ steps.build.outputs.aab-path }}
      version: ${{ steps.version.outputs.version }}

    steps:
      - uses: actions/checkout@v4

      - name: Determine Version
        id: version
        run: |
          if [ -z "${{ github.event.inputs.version }}" ]; then
            VERSION=$(grep 'versionName' android/app/build.gradle | sed -n 's/.*versionName "\(.*\)".*/\1/p')
          else
            VERSION="${{ github.event.inputs.version }}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "Version: $VERSION"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Setup Android
        uses: ./.github/actions/setup-android

      - name: Build AAB
        id: build
        uses: ./.github/actions/build-aab
        with:
          java-home: ${{ env.JAVA_HOME }}
          android-home: ${{ env.ANDROID_HOME }}
          keystore-base64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          keystore-password: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          key-alias: ${{ secrets.ANDROID_KEY_ALIAS }}
          key-password: ${{ secrets.ANDROID_KEY_PASSWORD }}
          maps-api-key: ${{ secrets.MAPS_API_KEY }}

      - name: Verify Signing
        uses: ./.github/actions/sign-aab
        with:
          expected-sha1: '34:C6:3A:57:7B:3C:06:5F:B3:5D:18:C6:65:E3:B6:6B:3A:29:F9:5F'

      - name: Upload to Play Store
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.PLAYSTORE_SERVICE_ACCOUNT_JSON }}
          packageName: com.adateo.WorldExplorer
          releaseFiles: 'android/app/build/outputs/bundle/release/app-release.aab'
          tracks: ${{ github.event.inputs.track }}
          releaseName: 'v${{ steps.version.outputs.version }}'
          status: completed

      - name: Create GitHub Release
        if: github.event.inputs.track == 'production'
        uses: softprops/action-gh-release@v1
        with:
          files: android/app/build/outputs/bundle/release/app-release.aab
          tag_name: v${{ steps.version.outputs.version }}
          body: |
            # WorldExplorer v${{ steps.version.outputs.version }}

            ## Release Track
            **${{ github.event.inputs.track }}** track deployment

            ## Release Notes
            ${{ github.event.inputs.release_notes || 'No additional notes provided' }}

            ## Build Details
            - Platform: Android
            - Build Type: release
            - Signing: production keystore
            - Date: ${{ github.event.repository }} at ${{ github.event.head_commit.timestamp }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Deployment Summary
        run: |
          echo "✅ Deployment completed"
          echo "📦 Version: v${{ steps.version.outputs.version }}"
          echo "📍 Track: ${{ github.event.inputs.track }}"
          echo "🏪 Play Store: app-release.aab uploaded"
          if [ "${{ github.event.inputs.track }}" == "production" ]; then
            echo "🏷️ GitHub Release: v${{ steps.version.outputs.version }} created"
          fi
