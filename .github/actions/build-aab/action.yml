name: Build Android App Bundle
description: Build production AAB with Gradle bundleRelease

inputs:
  java-home:
    description: Java home directory
    required: true
  android-home:
    description: Android SDK home directory
    required: true
  keystore-base64:
    description: Base64-encoded production keystore
    required: true
  keystore-password:
    description: Keystore password
    required: true
  key-alias:
    description: Key alias
    required: true
  key-password:
    description: Key password
    required: true
  maps-api-key:
    description: Google Maps API key injected into the release build via MAPS_API_KEY manifest placeholder
    required: true

runs:
  using: composite
  steps:
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Decode Production Keystore
      id: keystore
      shell: bash
      env:
        KEYSTORE_BASE64: ${{ inputs.keystore-base64 }}
      run: |
        if [ -n "$KEYSTORE_BASE64" ]; then
          echo "$KEYSTORE_BASE64" | base64 -d > /tmp/worldexplorer.keystore
          echo "path=/tmp/worldexplorer.keystore" >> $GITHUB_OUTPUT
        else
          echo "ERROR: keystore-base64 input not provided"
          exit 1
        fi

    - name: Build AAB Release
      shell: bash
      working-directory: ./android
      env:
        JAVA_HOME: ${{ inputs.java-home }}
        ANDROID_HOME: ${{ inputs.android-home }}
        ORG_GRADLE_PROJECT_WORLDEXPLORER_UPLOAD_STORE_FILE: ${{ steps.keystore.outputs.path }}
        ORG_GRADLE_PROJECT_WORLDEXPLORER_UPLOAD_STORE_PASSWORD: ${{ inputs.keystore-password }}
        ORG_GRADLE_PROJECT_WORLDEXPLORER_UPLOAD_KEY_ALIAS: ${{ inputs.key-alias }}
        ORG_GRADLE_PROJECT_WORLDEXPLORER_UPLOAD_KEY_PASSWORD: ${{ inputs.key-password }}
      run: |
        chmod +x gradlew
        ./gradlew bundleRelease --no-daemon --no-build-cache -x lint -PMAPS_API_KEY="${{ inputs.maps-api-key }}"

    - name: Verify AAB Output
      shell: bash
      run: |
        AAB_FILE="./android/app/build/outputs/bundle/release/app-release.aab"
        if [ -f "$AAB_FILE" ]; then
          SIZE=$(du -h "$AAB_FILE" | cut -f1)
          echo "✅ AAB Generated: $SIZE"
          ls -lh "$AAB_FILE"
        else
          echo "❌ AAB not found at $AAB_FILE"
          exit 1
        fi
