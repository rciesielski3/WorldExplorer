name: Build Android App Bundle
description: Build production AAB with Gradle bundleRelease

inputs:
  java-home:
    description: Java home directory
    required: true
  android-home:
    description: Android SDK home directory
    required: true

runs:
  using: composite
  steps:
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3

    - name: Decode Production Keystore
      shell: bash
      run: |
        if [ -n "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" ]; then
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > /tmp/worldexplorer.keystore
          echo "KEYSTORE_PATH=/tmp/worldexplorer.keystore" >> $GITHUB_ENV
        else
          echo "ERROR: ANDROID_KEYSTORE_BASE64 secret not found"
          exit 1
        fi

    - name: Build AAB Release
      shell: bash
      working-directory: ./android
      env:
        JAVA_HOME: ${{ inputs.java-home }}
        ANDROID_HOME: ${{ inputs.android-home }}
        ORG_GRADLE_PROJECT_WORLDEXPLORER_UPLOAD_STORE_FILE: ${{ env.KEYSTORE_PATH }}
        ORG_GRADLE_PROJECT_WORLDEXPLORER_UPLOAD_STORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        ORG_GRADLE_PROJECT_WORLDEXPLORER_UPLOAD_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
        ORG_GRADLE_PROJECT_WORLDEXPLORER_UPLOAD_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
      run: |
        chmod +x gradlew
        ./gradlew bundleRelease --no-daemon --no-build-cache -x lint

    - name: Verify AAB Output
      shell: bash
      run: |
        AAB_FILE="./android/app/build/outputs/bundle/release/app-release.aab"
        if [ -f "$AAB_FILE" ]; then
          SIZE=$(du -h "$AAB_FILE" | cut -f1)
          echo "✅ AAB Generated: $SIZE"
          ls -lh "$AAB_FILE"
        else
          echo "❌ AAB not found at $AAB_FILE"
          exit 1
        fi
