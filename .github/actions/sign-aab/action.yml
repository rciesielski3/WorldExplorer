name: Verify AAB Signing
description: Verify AAB is signed with correct production certificate

inputs:
  expected-sha1:
    description: Expected certificate SHA1
    required: true
    default: '34:C6:3A:57:7B:3C:06:5F:B3:5D:18:C6:65:E3:B6:6B:3A:29:F9:5F'

runs:
  using: composite
  steps:
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '21'

    - name: Verify AAB Signing
      shell: bash
      run: |
        AAB_FILE="./android/app/build/outputs/bundle/release/app-release.aab"
        EXPECTED_SHA1="${{ inputs.expected-sha1 }}"

        echo "Verifying AAB signing certificate..."

        # Extract certificate from AAB and get SHA1
        unzip -q "$AAB_FILE" -d /tmp/aab_extract

        # Find the certificate file (works for CERT.RSA, CERT.DSA, etc.)
        CERT_FILE=$(find /tmp/aab_extract/META-INF -name "CERT.*" -type f | head -1)

        if [ -z "$CERT_FILE" ]; then
          echo "❌ Certificate not found in AAB"
          exit 1
        fi

        # Get SHA1 fingerprint of certificate
        ACTUAL_SHA1=$(keytool -printcert -file "$CERT_FILE" | grep "SHA1:" | awk '{print $NF}')

        if [ -z "$ACTUAL_SHA1" ]; then
          echo "❌ Could not extract certificate SHA1"
          exit 1
        fi

        echo "Expected SHA1: $EXPECTED_SHA1"
        echo "Actual SHA1:   $ACTUAL_SHA1"

        if [ "$ACTUAL_SHA1" = "$EXPECTED_SHA1" ]; then
          echo "✅ AAB signed with correct production certificate"
        else
          echo "❌ Certificate mismatch! AAB is NOT signed with production key"
          exit 1
        fi
